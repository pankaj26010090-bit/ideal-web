<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aisha (pankaj bestie)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #ffe6e9; color: #333; display: flex; justify-content: center; height: 100vh; margin: 0; }
        .chat-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; background: #fff; height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        
        /* Header Design - Romantic Theme */
        .header { padding: 15px; background: #ff4081; color: white; text-align: center; border-bottom: 1px solid #e91e63; }
        .header h3 { margin: 0; font-size: 20px; }
        .status-badge { font-size: 11px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 10px; color: #fff; margin-top: 5px; display: inline-block; }
        
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-color: #fff0f5; }
        
        /* Message Bubbles */
        .message { padding: 10px 15px; border-radius: 20px; max-width: 80%; word-wrap: break-word; font-size: 15px; }
        .user { align-self: flex-end; background: #ff4081; color: white; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: #fff; color: #333; border: 1px solid #ffc1e3; border-top-left-radius: 2px; box-shadow: 1px 1px 5px rgba(0,0,0,0.05); }
        
        .input-area { padding: 15px; background: #fff; display: flex; gap: 10px; border-top: 1px solid #eee; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; background: #f9f9f9; outline: none; }
        button { padding: 10px 20px; background: #ff4081; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h3>❤️ Aisha (Pankaj bestie)</h3>
        <span id="connectionStatus" class="status-badge">Online...</span>
    </div>

    <div class="messages" id="chatBox">
        <div class="message bot">
            Hello buddy! ❤️ Main  Aisha hun. Kaho, aaj kya karne ka man hai?
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Apni Aisha se kuch kaho..." onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" id="sendBtn">Send</button>
    </div>
</div>

<script>
    // ✅ Updated Key
    const API_KEY = "AIzaSyBS0D6C39Qbk3we-f8TQ3kE5d4c9l0fC24"; 
    
    let fetchedModels = []; 
    let currentWorkingModel = null;
    
    // ❤️ SYSTEM PROMPT: Ye uski personality hai
    const SYSTEM_INSTRUCTION = `
    You always have to talk romantically in Hindi. 
    `;

    // 🧠 MEMORY: Ye purani baatein yaad rakhegi
    let chatHistory = [
        { role: "user", parts: [{ text: SYSTEM_INSTRUCTION }] },
        { role: "model", parts: [{ text: "Okay baby, samajh gayi. Main hamesha tumhare saath hun." }] }
    ];

    function handleEnter(e) {
        if (e.key === 'Enter') sendMessage();
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        const statusLabel = document.getElementById('connectionStatus');
        const text = input.value.trim();

        if (!text) return;

        // Display User Message
        chatBox.innerHTML += `<div class="message user">${text}</div>`;
        input.value = "";
        
        // Add to Memory
        chatHistory.push({ role: "user", parts: [{ text: text }] });

        // Loading UI
        const loadingId = "load_" + Date.now();
        chatBox.innerHTML += `<div class="message bot" id="${loadingId}">Typing... ❤️</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        // Auto-Model Logic (Same as before)
        if (fetchedModels.length === 0) {
            statusLabel.innerText = "Connecting to Heart... 📡";
            try {
                const listUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`;
                const res = await fetch(listUrl);
                const data = await res.json();
                if (data.models) {
                    fetchedModels = data.models
                        .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                        .map(m => m.name.replace("models/", ""));
                }
            } catch (err) { console.error(err); }
        }

        let replyText = "";
        let success = false;
        const modelsToTry = currentWorkingModel ? [currentWorkingModel] : fetchedModels;

        // Loop to find working model
        for (const modelName of modelsToTry) {
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 🧠 IMPORTANT: Sending Full History for Context
                    body: JSON.stringify({ contents: chatHistory })
                });

                const data = await response.json();

                if (!data.error && data.candidates && data.candidates[0].content) {
                    replyText = data.candidates[0].content.parts[0].text;
                    success = true;
                    currentWorkingModel = modelName;
                    statusLabel.innerText = `❤️ Connected with Aisha`;
                    break;
                }
            } catch (e) { }
        }

        const msgDiv = document.getElementById(loadingId);
        
        if (success) {
            // Save Reply to Memory
            chatHistory.push({ role: "model", parts: [{ text: replyText }] });
            
            msgDiv.innerHTML = replyText
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/\n/g, '<br>'); 
        } else {
            msgDiv.innerHTML = `❌ Baby, connection lost ho gaya. Phir se try karo na.`;
            statusLabel.innerText = "❌ Offline";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
